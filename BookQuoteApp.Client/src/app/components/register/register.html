<div class="row justify-content-center">
  <div class="col-md-6 col-lg-4">
    <div class="card shadow-lg border-0">
      <div class="card-header text-white text-center py-4" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
        <i class="fas fa-user-plus fa-3x mb-2"></i>
        <h3 class="mb-0 fw-bold">Skapa konto</h3>
        <p class="mb-0 mt-2 opacity-75">Bli medlem hos BookQuoteApp</p>
      </div>
      <div class="card-body p-4">
        <form #registerForm="ngForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label fw-bold">
              <i class="fas fa-user me-1"></i>Användarnamn
            </label>
            <input type="text" class="form-control" [(ngModel)]="username" name="username" required placeholder="Välj ett användarnamn">
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">
              <i class="fas fa-lock me-1"></i>Lösenord
            </label>
            <input type="password" class="form-control" [(ngModel)]="password" name="password" required placeholder="Välj ett lösenord">
          </div>
          <button type="submit" class="btn w-100 rounded-pill text-white" [disabled]="!registerForm.valid" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
            <i class="fas fa-user-plus me-2"></i>Registrera
          </button>
        </form>
        <p class="mt-4 text-center">
          Har du redan ett konto? <a routerLink="/login" class="fw-bold" style="color: #667eea;">Logga in</a>
        </p>
      </div>
    </div>
  </div>
</div>
